<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- StyleSheet, FebIcon and Title -->
    <title>GitHub Issue Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./assets/github-feb-logo.png"
      type="image/x-icon"
    />

    <!-- Google Font & FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200">
    <main
      class="max-w-md mx-auto min-h-screen flex justify-center items-center"
    >
      <div class="card bg-base-100 w-96 shadow-sm p-8">
        <div class="space-y-5 text-center">
          <div>
            <img class="mx-auto" src="./assets/github-logo.png" alt="" />
          </div>
          <div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>
        </div>
        <div class="card-body">
          <fieldset class="fieldset">
            <label for="" class="text-xl">Username</label>
            <input
              id="username"
              type="text"
              placeholder="Enter Username"
              class="input input-md"
            />
            <br />
            <label for="" class="text-xl">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              class="input input-md"
            />
            <br />
            <button id="signIn-btn" class="btn btn-primary">Sign In</button>
          </fieldset>
        </div>
      </div>
    </main>

    <section class="modal">
      <!-- Open the modal using ID.showModal() method -->
      <button class="btn" onclick="my_modal_2.showModal()">open modal</button>
      <dialog id="my_modal_2" class="modal">
        <div class="modal-box">
          <h3 id="title" class="text-lg font-bold text-red-400"></h3>
          <p id="msg" class="py-4"></p>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn">Close</button>
            </form>
          </div>
        </div>
        <form method="dialog" class="modal-backdrop">
          <button>close</button>
        </form>
      </dialog>
    </section>
    <script src="./index.js"></script>
  </body>
</html>
