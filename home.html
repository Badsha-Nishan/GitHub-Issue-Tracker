<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./assets/github-feb-logo.png"
      type="image/x-icon"
    />

    <!-- Google Font & FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200">
    <header>
      <nav class="bg-base-100 shadow-sm">
        <div class="navbar w-11/12 mx-auto">
          <div class="flex-1">
            <a href="./home.html" class="btn btn-ghost text-sm md:text-base lg:text-xl"
              ><img
                class="max-w-10"
                src="./assets/github-logo.png"
              />GitHub Issues Tracker</a
            >
          </div>
          <div class="flex gap-2">
            <input
              id="searchIssue"
              type="text"
              placeholder="🔍 Search Issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <div>
              <button id="searchBtn" class="btn btn-primary">Search</button>
              <button id="logoutBtn" class="btn btn-primary">
                <i
                  class="fa-solid fa-arrow-right-from-bracket"
                  style="color: rgb(116, 192, 252)"
                ></i>
                LogOut
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main id="mainSection" class="mt-14 w-11/12 mx-auto">
      <!-- Filtered BUttons Section -->
      <section class="shadow-sm">
        <div class="buttons p-6 bg-base-100 rounded-md">
          <button
            onclick="tabStyle('allBtn')"
            id="allBtn"
            class="btn px-8 bg-primary text-white"
          >
            All
          </button>
          <button onclick="tabStyle('openBtn')" id="openBtn" class="btn px-8">
            Open
          </button>
          <button
            onclick="tabStyle('closedBtn')"
            id="closedBtn"
            class="btn px-8"
          >
            Closed
          </button>
        </div>
      </section>

      <!-- Total Issues Section -->
      <section class="shadow-sm">
        <div
          class="flex p-6 bg-base-100 rounded-md mt-4 items-center justify-between"
        >
          <div class="flex gap-3 items-center">
            <div class="border-blue-200 rounded-full border-8">
              <img src="./assets/Aperture.png" alt="" />
            </div>
            <div>
              <h2 class="text-2xl font-semibold">
                <span id="totalIssues">0</span> Issues
              </h2>
              <p>Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-7">
            <p>🟢 Open</p>
            <p>🟣 Closed</p>
          </div>
        </div>
      </section>

      <!-- All Card Section -->
      <section
        id="cardsContainer"
        class="p-6 bg-base-100 mt-1 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
      >
        <!-- Loading spinner -->
        <div id="spinner" class="hidden justify-center items-center col-span-3">
          <span class="loading loading-dots loading-xl"></span>
        </div>
      </section>

      <!-- Modal Section -->
      <section>
        <!-- Open the modal using ID.showModal() method -->
        <button class="btn hidden" onclick="my_modal_5.showModal()">
          open modal
        </button>
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">
            <div class="space-y-7">
              <h2 id="cardTitle" class="text-xl font-bold mb-3"></h2>
              <ul class="flex gap-7 list-disc">
                <li id="cardStatus" class="badge text-white rounded-full"></li>
                <li id="cardAuthor1"></li>
                <li id="date"></li>
              </ul>
              <div>
                <p
                  id="cardLabel1"
                  class="badge badge-outline bg-[#FECACA] badge-secondary"
                ></p>
                <p
                  id="cardLabel2"
                  class="badge badge-outline bg-[#FDE68A] text-[#D97706]"
                ></p>
              </div>
              <p id="cardDescription" class="text-[#64748B]">
                The navigation menu doesn't collapse properly on mobile devices.
                Need to fix the responsive behavior.
              </p>
              <div class="flex gap-32">
                <div>
                  <p class="text-[#64748B]">Assignee:</p>
                  <p id="cardAuthor" class="font-semibold"></p>
                </div>
                <div>
                  <p class="text-[#64748B]">Priority:</p>
                  <p
                    id="cardPriority"
                    class="badge bg-[#EF4444] rounded-full text-white"
                  ></p>
                </div>
              </div>
            </div>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn bg-primary text-white">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
